name: CI

on:
  pull_request:
    branches: [master, qa-local, pre-prod]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RadMapping+
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Syntax check
        run: python -m compileall .

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RadMapping+
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Dependency integrity check
        run: python -m pip check

  build:
    name: build
    if: github.base_ref != 'qa-local'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RadMapping+
    steps:
      - uses: actions/checkout@v4
      - name: Build container
        run: docker build -t radmapping-plus-ci .
